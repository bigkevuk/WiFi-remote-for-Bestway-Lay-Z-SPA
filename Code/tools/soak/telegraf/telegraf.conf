[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "1s"
  debug = false
  quiet = false
  hostname = "layzspa-soak"
  omit_hostname = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["${MQTT_BASE_TOPIC}/message"]
  qos = 0
  connection_timeout = "30s"
  client_id = "layzspa-telegraf-message"
  username = "telegraf"
  password = "layzspaM0dule"
  data_format = "json_v2"
  name_override = "layzspa_message"
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "TMPC"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "TGTC"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "TMPF"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "TGTF"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "GRN"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "FLT"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "AIR"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "HJT"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "PWR"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "LCK"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ERR"
      type = "string"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "TIME"
      type = "int"

